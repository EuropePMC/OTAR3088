
task_type: ner

#data
data:
  name: CeLLaTe_no_vague
  version: 1.0
  hf_path: OTAR3088/CeLLaTe_V1.0_no_vague_IOB
  text_col: tokens
  label_col: tags
  source_type: hf

#data attributes
ner_tag_list: [B-CellLine, I-CellLine, B-CellType, I-CellType, B-Tissue, I-Tissue, O]
label_names: [CellLine, CellType, Tissue]

# Model & Tokenizer
model_name_or_path: Mardiyyah/cellate2.0-tapt_base-LR_5e-05


# Training hyperparameters
args:
  learning_rate: ${lr}
  per_device_train_batch_size: ${batch_size}
  per_device_eval_batch_size: ${eval_batch_size}
  num_train_epochs: ${num_epochs}
  weight_decay: ${weight_decay}
  warmup_ratio: ${warmup_ratio}
  dataloader_num_workers: 0
  save_steps: 100
  eval_steps: 100
  #warmup_steps: 500
  lr_scheduler_type: linear
  overwrite_output_dir: true

  # Logging and evaluation
  logging_steps: 100
  logging_strategy: steps
  eval_strategy: steps
  save_strategy: steps
  save_total_limit: null 
  load_best_model_at_end: true
  metric_for_best_model: eval_f1
  greater_is_better: true
  group_by_length: true
  do_train: true
  label_smoothing_factor: 0.0
  #gradient_accumulation_steps: 2

  # Optional params 
  fp16: true #mixed precision for faster training on GPU 
  seed: ${seed}
  data_seed: ${seed}

apply_downsample: false
downsample_ratio: 0.2

run_wandb_sweep: false

#pipeline specific modelling params
#trainer initialiser
trainer_type: base #different from model_type. Current Options[base, crf, weighted]

#model builder
ner_head_type: standard #different from trainer_type. Current Options[standard, crf]

## Data augmentation using gazetters
use_data_aug: false
data_aug_method: gazetteer
max_ent_per_type: 5000
aug_prob: 0.5

#use_weighted_trainer: false


#WANDB Sweeps config
sweeps_config: 
  name: CeLLaTeNerModel
  method: bayes
  metric: 
    name: eval_f1
    goal: maximize
  parameters:
    learning_rate:
      min: 5e-6
      max: 1e-3
      distribution: uniform
    train_batch_size:
      values: [16, 32]
    eval_batch_size:
      value: 16
    epochs: 
      values: [10, 20, 50]
    weight_decay: 
      values: [0.1, 0.01, 0.001]
    warmup_ratio:
      min: 0.06
      max: 0.2
      #values: [0.06, 0.1, 0.02]
      distribution: uniform
    lr_scheduler_type:
      values: ['linear', 'cosine']
  early_terminate:
    type: hyperband
    min_iter: 3
    eta: 5
